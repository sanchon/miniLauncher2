[mini-launcher]
# Valores por defecto para todos los comandos con mode=browser (opcional).
# Si browser_executable está vacío, se usa el navegador predeterminado del sistema.
# En arguments usa el marcador {url} (la URL ya construida del template).
# browser_executable = C:\Program Files\Mozilla Firefox\firefox.exe
# browser_arguments = {url}
browser_executable =
browser_arguments =

[deploy]
description = Despliega una version en un entorno
mode = shell
template = echo Desplegando entorno={env} version={version}
params = env, version
required = env, version
env.choices = dev, staging, prod

[logs]
description = Muestra logs filtrados por servicio y nivel
mode = shell
template = echo Mostrando logs de servicio={service} nivel={level}
params = service, level
required = service
service.choices = api, worker, web
level.choices = info, warn, error

[buscar]
description = Abre una busqueda en el navegador por defecto
mode = browser
template = https://www.google.com/search?q={termino}
params = termino
required = termino

[abrir]
description = Abre fichero o URL con la app asociada
mode = open
template = {ruta}
params = ruta
required = ruta
ruta.path = true

[git_version]
description = Muestra la version de git (subproceso, sin shell)
mode = exec
executable = git
arguments = --version

[git_log]
description = Ultimas confirmaciones de git (oneline)
mode = exec
executable = git
arguments = log -n {n} --oneline
params = n
required = n
n.choices = 1, 3, 5

[neovide_editar]
description = Abre Neovide en un fichero (:e)
mode = exec
executable = neovide
arguments = -- -c ":e {fichero}"
detach = true
params = fichero
required = fichero
fichero.path = true