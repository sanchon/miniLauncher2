[mini-launcher]
# Valores por defecto para todos los comandos con mode=browser (opcional).
# Si browser_executable está vacío, se usa el navegador predeterminado del sistema.
# En arguments usa el marcador {url} (la URL ya construida del template).
# browser_executable = C:\Program Files\Mozilla Firefox\firefox.exe
# browser_arguments = {url}
browser_executable =
browser_arguments =

[deploy]
description = Despliega una version en un entorno
mode = shell
template = echo Desplegando entorno={env} version={version}
params = env, version
required = env, version
env.choices = dev, staging, prod

[logs]
description = Muestra logs filtrados por servicio y nivel
mode = shell
template = echo Mostrando logs de servicio={service} nivel={level}
params = service, level
required = service
service.choices = api, worker, web
level.choices = info, warn, error

[buscar]
description = Abre una busqueda en el navegador por defecto
mode = browser
template = https://www.google.com/search?q={termino}
params = termino
required = termino

[abrir]
description = Abre fichero o URL con la app asociada
mode = open
template = {ruta}
params = ruta
required = ruta
ruta.path = true

[git_version]
description = Muestra la version de git (subproceso, sin shell)
mode = exec
executable = git
arguments = --version

[git_log]
description = Ultimas confirmaciones de git (oneline)
mode = exec
executable = git
arguments = log -n {n} --oneline
params = n
required = n
n.choices = 1, 3, 5

[neovide_editar]
description = Abre Neovide en un fichero (:e)
mode = exec
executable = neovide
arguments = -- -c ":e {fichero}"
detach = true
params = fichero
required = fichero
fichero.path = true

# --- Búsquedas en el navegador ---

[yt]
description = Busca en YouTube
mode = browser
template = https://www.youtube.com/results?search_query={q}
params = q
required = q

[gh]
description = Busca en GitHub
mode = browser
template = https://github.com/search?q={q}&type=repositories
params = q
required = q

[npm]
description = Busca un paquete en npm
mode = browser
template = https://www.npmjs.com/search?q={q}
params = q
required = q

[pypi]
description = Busca un paquete en PyPI
mode = browser
template = https://pypi.org/search/?q={q}
params = q
required = q

[mdn]
description = Busca en MDN Web Docs
mode = browser
template = https://developer.mozilla.org/es/search?q={q}
params = q
required = q

[wiki]
description = Busca en Wikipedia en español
mode = browser
template = https://es.wikipedia.org/w/index.php?search={q}
params = q
required = q

[so]
description = Busca en Stack Overflow
mode = browser
template = https://stackoverflow.com/search?q={q}
params = q
required = q

# --- Utilidades de sistema ---

[buscar_archivo]
description = Busca un archivo por nombre bajo una carpeta
mode = shell
template = find {carpeta} -name "*{nombre}*" 2>/dev/null
params = carpeta, nombre
required = nombre
carpeta.path = true

[grep_en]
description = Busca texto recursivamente en una carpeta
mode = shell
template = grep -rn --color=always {texto} {carpeta}
params = texto, carpeta
required = texto, carpeta
carpeta.path = true

[puertos]
description = Muestra los puertos TCP en escucha
mode = shell
template = ss -tlnp

[uso_disco]
description = Uso de disco de una carpeta (top 10)
mode = shell
template = du -sh {carpeta}/* 2>/dev/null | sort -rh | head -10
params = carpeta
required = carpeta
carpeta.path = true

[matar]
description = Mata todos los procesos con ese nombre
mode = shell
template = pkill -f {proceso}
params = proceso
required = proceso

# --- Herramientas de desarrollo ---

[code]
description = Abre VS Code en una carpeta
mode = exec
executable = code
arguments = {carpeta}
detach = true
params = carpeta
required = carpeta
carpeta.path = true

[git_status]
description = Estado del repo en una carpeta
mode = shell
template = git -C {carpeta} status
params = carpeta
required = carpeta
carpeta.path = true

[docker_ps]
description = Lista contenedores Docker (todos o solo activos)
mode = exec
executable = docker
arguments = ps {flag}
params = flag
flag.choices = , -a

[http]
description = Servidor HTTP simple en la carpeta actual
mode = shell
template = python3 -m http.server {puerto}
params = puerto
required = puerto
puerto.choices = 8000, 8080, 3000, 5000

# --- Carpetas frecuentes ---

[home]
description = Abre la carpeta home
mode = open
template = ~

[downloads]
description = Abre la carpeta de descargas
mode = open
template = ~/Downloads

[tmp]
description = Abre /tmp
mode = open
template = /tmp